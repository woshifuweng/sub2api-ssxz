name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'How to compute the next version from the latest v* tag'
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      simple_release:
        description: 'Simple release: GHCR only, skip archives and Docker Hub metadata steps'
        required: false
        type: boolean
        default: false

# 环境变量：合并 workflow_dispatch 输入和 repository variable
# tag push 触发时读取 vars.SIMPLE_RELEASE，workflow_dispatch 时使用输入参数
env:
  SIMPLE_RELEASE: ${{ github.event.inputs.simple_release == 'true' || vars.SIMPLE_RELEASE == 'true' }}

permissions:
  contents: write
  packages: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      create_local_tag: ${{ steps.meta.outputs.create_local_tag }}
      tag_message: ${{ steps.meta.outputs.tag_message }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          bump_tag() {
            local tag="$1"
            local bump="$2"
            local version="${tag#v}"
            local major minor patch
            IFS='.' read -r major minor patch <<<"$version"
            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported version bump: $bump" >&2
                exit 1
                ;;
            esac
            printf 'v%d.%d.%d' "$major" "$minor" "$patch"
          }

          create_local_tag=false
          target_sha="${GITHUB_SHA}"

          if [ "${{ github.event_name }}" = "push" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            target_sha="$(git rev-list -n 1 "$release_tag")"
            tag_message="$(git tag -l --format='%(contents:body)' "$release_tag")"
          else
            latest_tag="$(git tag -l --sort=-version:refname 'v*' | head -n 1)"
            if [ -z "$latest_tag" ]; then
              latest_tag="v0.1.0"
            fi
            release_tag="$(bump_tag "$latest_tag" "${{ github.event.inputs.version_bump || 'patch' }}")"

            if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
              target_sha="$(git rev-list -n 1 "$release_tag")"
              tag_message="$(git tag -l --format='%(contents:body)' "$release_tag")"
            else
              create_local_tag=true
              tag_message="Release ${release_tag}"
            fi
          fi

          release_version="${release_tag#v}"

          {
            echo "release_tag=${release_tag}"
            echo "release_version=${release_version}"
            echo "target_sha=${target_sha}"
            echo "create_local_tag=${create_local_tag}"
            echo "tag_message<<EOF"
            echo "$tag_message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: [prepare-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend
        env:
          VITE_CHAT_WORKSPACE_BACKEND_ENABLED: 'true'

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
          retention-days: 1

  release:
    needs: [prepare-release, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: Write release VERSION file
        run: |
          VERSION='${{ needs.prepare-release.outputs.release_version }}'
          echo "$VERSION" > backend/cmd/server/VERSION
          echo "Release VERSION file set to: $VERSION"

      - name: Create local annotated release tag
        if: ${{ needs.prepare-release.outputs.create_local_tag == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a '${{ needs.prepare-release.outputs.release_tag }}' '${{ needs.prepare-release.outputs.target_sha }}' -m '${{ needs.prepare-release.outputs.tag_message }}'

      - name: Push generated release tag
        if: ${{ needs.prepare-release.outputs.create_local_tag == 'true' }}
        run: git push origin refs/tags/${{ needs.prepare-release.outputs.release_tag }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: backend/internal/web/dist/

      - name: Normalize frontend artifact layout
        shell: bash
        run: |
          if [ -f backend/internal/web/dist/index.html ]; then
            echo "Frontend artifact already in expected location"
            exit 0
          fi

          ALT_INDEX=$(find backend/internal/web/dist -path '*/index.html' | head -n 1)
          if [ -z "$ALT_INDEX" ]; then
            echo "Expected frontend artifact was not downloaded correctly"
            find backend/internal/web -maxdepth 4 -type f | sort
            exit 1
          fi

          ALT_DIR=$(dirname "$ALT_INDEX")
          echo "Flattening nested frontend artifact from: $ALT_DIR"
          cp -R "$ALT_DIR"/. backend/internal/web/dist/
          test -f backend/internal/web/dist/index.html

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      # Docker setup for GoReleaser
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag message
        id: tag_message
        run: |
          git fetch --tags --force
          TAG_NAME='${{ needs.prepare-release.outputs.release_tag }}'
          echo "Processing tag: $TAG_NAME"

          # 获取完整的 tag message（跳过第一行标题）
          TAG_MESSAGE=$(git tag -l --format='%(contents:body)' "$TAG_NAME")

          # 调试输出
          echo "Tag message length: ${#TAG_MESSAGE}"
          echo "Tag message preview:"
          echo "$TAG_MESSAGE" | head -10

          # 使用 EOF 分隔符处理多行内容
          {
            echo "message<<EOF"
            echo "$TAG_MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set lowercase owner for GHCR
        id: lowercase
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve GoReleaser config
        id: goreleaser_config
        shell: bash
        run: |
          if [ "${{ env.SIMPLE_RELEASE }}" = "true" ]; then
            echo "config=.goreleaser.simple.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "config=.goreleaser.yaml" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean --skip=validate --config=${{ steps.goreleaser_config.outputs.config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'skip' }}

      # Update DockerHub description
      - name: Update DockerHub description
        if: ${{ env.SIMPLE_RELEASE != 'true' && env.DOCKERHUB_USERNAME != '' }}
        uses: peter-evans/dockerhub-description@v5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/sub2api
          short-description: "Sub2API - AI API Gateway Platform"
          readme-filepath: ./deploy/DOCKER.md

      # Send Telegram notification
      - name: Send Telegram Notification
        if: ${{ env.SIMPLE_RELEASE != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        continue-on-error: true
        run: |
          # 检查必要的环境变量
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi

          TAG_NAME='${{ needs.prepare-release.outputs.release_tag }}'
          VERSION=${TAG_NAME#v}
          REPO="${{ github.repository }}"
          GHCR_IMAGE="ghcr.io/${REPO,,}"  # ${,,} converts to lowercase

          # 获取 tag message 内容并转义 Markdown 特殊字符
          TAG_MESSAGE='${{ steps.tag_message.outputs.message }}'
          backtick='`'
          TAG_MESSAGE=${TAG_MESSAGE//\\/\\\\}
          TAG_MESSAGE=${TAG_MESSAGE//_/\\_}
          TAG_MESSAGE=${TAG_MESSAGE//\*/\\*}
          TAG_MESSAGE=${TAG_MESSAGE//${backtick}/\\${backtick}}
          TAG_MESSAGE=${TAG_MESSAGE//\[/\\[}

          # 限制消息长度（Telegram 消息限制 4096 字符，预留空间给头尾固定内容）
          if [ ${#TAG_MESSAGE} -gt 3500 ]; then
            TAG_MESSAGE="${TAG_MESSAGE:0:3500}..."
          fi

          # 构建消息内容
          MESSAGE="🚀 *Sub2API 新版本发布！*"$'\n'$'\n'
          MESSAGE+="📦 版本号: \`${VERSION}\`"$'\n'$'\n'

          # 添加更新内容
          if [ -n "$TAG_MESSAGE" ]; then
            MESSAGE+="${TAG_MESSAGE}"$'\n'$'\n'
          fi

          MESSAGE+="🐳 *Docker 部署:*"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          # 根据是否配置 DockerHub 动态生成
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            DOCKER_IMAGE="${DOCKERHUB_USERNAME}/sub2api"
            MESSAGE+="# Docker Hub"$'\n'
            MESSAGE+="docker pull ${DOCKER_IMAGE}:${VERSION}"$'\n'
            MESSAGE+="# GitHub Container Registry"$'\n'
          fi
          MESSAGE+="docker pull ${GHCR_IMAGE}:${VERSION}"$'\n'
          MESSAGE+="\`\`\`"$'\n'$'\n'
          MESSAGE+="🔗 *相关链接:*"$'\n'
          MESSAGE+="• [GitHub Release](https://github.com/${REPO}/releases/tag/${TAG_NAME})"$'\n'
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            MESSAGE+="• [Docker Hub](https://hub.docker.com/r/${DOCKER_IMAGE})"$'\n'
          fi
          MESSAGE+="• [GitHub Packages](https://github.com/${REPO}/pkgs/container/sub2api)"$'\n'$'\n'
          MESSAGE+="#Sub2API #Release #${TAG_NAME//./_}"

          # 发送消息
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "${TELEGRAM_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "Markdown",
                disable_web_page_preview: true
              }')"

  sync-version-file:
    needs: [prepare-release, release]
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync VERSION file to released tag
        run: |
          VERSION='${{ needs.prepare-release.outputs.release_version }}'

          CURRENT_VERSION=$(tr -d '\r\n' < backend/cmd/server/VERSION || true)
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "VERSION file already matches $VERSION"
            exit 0
          fi

          echo "$VERSION" > backend/cmd/server/VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/cmd/server/VERSION
          git commit -m "chore: sync VERSION to ${VERSION} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
